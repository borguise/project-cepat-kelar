spring.application.name=fe
spring.app.protocol=http

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/project_cepat_kelar
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# FreeMarker Configuration
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.charset=UTF-8
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true
spring.freemarker.request-context-attribute=request

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.session.cookie.domain=localhost

# Google reCAPTCHA (test keys)
google.recaptcha.url=https://www.google.com/recaptcha/api/siteverify
google.recaptcha.secretkey=6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI

# Domain
domain.root=localhost:8080

# Email
email.address.whiteDomainList=

# File upload directories
file.uploaded-temp-dir=./tmp/uploads
file.uploaded-dir=./uploads
